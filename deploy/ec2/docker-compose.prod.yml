services:
  caddy:
    image: caddy:2-alpine
    container_name: paperhunt-caddy
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend-service

  frontend:
    image: ${ECR_REGISTRY}/paperhunt-frontend:${IMAGE_TAG}
    container_name: paperhunt-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend-service

  backend-service:
    image: ${ECR_REGISTRY}/paperhunt-backend:${IMAGE_TAG}
    container_name: paperhunt-backend
    restart: unless-stopped
    environment:
      PORT: "5000"
      NODE_ENV: ${NODE_ENV}
      CLIENT_URL: ${CLIENT_URL}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE}
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      VERIFIED_SENDER_EMAIL: ${VERIFIED_SENDER_EMAIL}
      REDIS_CONNECTION_URL: ${REDIS_CONNECTION_URL:-}
      REDIS_USERNAME: ${REDIS_USERNAME:-default}
      REDIS_URL: ${REDIS_URL:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_TLS: ${REDIS_TLS:-false}
      REDIS_DB_PASSWORD: ${REDIS_DB_PASSWORD:-}
    depends_on:
      - redis
    expose:
      - "5000"

  redis:
    image: redis:7-alpine
    container_name: paperhunt-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    expose:
      - "6379"

volumes:
  caddy_data:
  caddy_config:
  redis_data:
