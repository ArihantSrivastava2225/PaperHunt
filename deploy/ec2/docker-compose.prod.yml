services:
  caddy:
    image: caddy:2-alpine
    container_name: paperhunt-caddy
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend-service

  frontend:
    image: ${ECR_REGISTRY}/paperhunt-frontend:${IMAGE_TAG}
    container_name: paperhunt-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend-service

  backend-service:
    image: ${ECR_REGISTRY}/paperhunt-backend:${IMAGE_TAG}
    container_name: paperhunt-backend
    restart: unless-stopped
    environment:
      PORT: "5000"
      NODE_ENV: ${NODE_ENV}
      CLIENT_URL: ${CLIENT_URL}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE}
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      VERIFIED_SENDER_EMAIL: ${VERIFIED_SENDER_EMAIL}
      REDIS_CONNECTION_URL: ${REDIS_CONNECTION_URL:-}
      REDIS_USERNAME: ${REDIS_USERNAME:-default}
      REDIS_URL: ${REDIS_URL:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_TLS: ${REDIS_TLS:-false}
      REDIS_DB_PASSWORD: ${REDIS_DB_PASSWORD:-}
    depends_on:
      - redis
    expose:
      - "5000"

  redis:
    image: redis:7-alpine
    container_name: paperhunt-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    expose:
      - "6379"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: paperhunt-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-7d}"
      - "--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-1GB}"
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend-service
      - node-exporter
      - cadvisor

  grafana:
    image: grafana/grafana:11.3.1
    container_name: paperhunt-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:${GRAFANA_HOST_PORT:-3001}
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: paperhunt-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro,rslave
    expose:
      - "9100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: paperhunt-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    expose:
      - "8080"

volumes:
  caddy_data:
  caddy_config:
  redis_data:
  prometheus_data:
  grafana_data:
