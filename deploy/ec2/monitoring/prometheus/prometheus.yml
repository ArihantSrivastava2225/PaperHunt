global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: paperhunt-backend
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - backend-service:5000

  - job_name: ec2-node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: docker-containers
    static_configs:
      - targets:
          - cadvisor:8080
