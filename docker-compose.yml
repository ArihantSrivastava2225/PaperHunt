services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/paperhunt
      REDIS_URL: redis
      REDIS_PORT: 6379
      REDIS_DB_PASSWORD:
      CLIENT_URL: http://localhost:8080
    ports:
      - "5000:5000"
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data: