apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: paperhunt
type: Opaque
stringData:
  JWT_SECRET: "replace-with-local-jwt-secret"
  GEMINI_API_KEY: "replace-with-local-gemini-api-key"
  NEWS_API_KEY: "replace-with-local-news-api-key"
  SENDGRID_API_KEY: "replace-with-local-sendgrid-api-key"
  VERIFIED_SENDER_EMAIL: "replace-with-local-sender-email"
  REDIS_DB_PASSWORD: ""
