apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: paperhunt
type: Opaque
stringData:
  JWT_SECRET: "replace-with-local-jwt-secret"
  GEMINI_API_KEY: "replace-with-local-gemini-api-key"
  NEWS_API_KEY: "replace-with-local-news-api-key"
  SMTP_USER: "replace-with-ses-smtp-username"
  SMTP_PASS: "replace-with-ses-smtp-password"
  MAIL_FROM: "PaperHunt <contact@paperhunt.in>"
  CONTACT_RECEIVER_EMAIL: "replace-with-verified-receiver-email"
  REDIS_DB_PASSWORD: ""
