apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: paperhunt
data:
  PORT: "5000"
  NODE_ENV: "development"
  CLIENT_URL: "http://localhost:30080"
  MONGO_URI: "mongodb://mongo-service:27017/paperhunt"
  REDIS_URL: "redis-service"
  REDIS_PORT: "6379"
  SMTP_HOST: "email-smtp.eu-north-1.amazonaws.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
